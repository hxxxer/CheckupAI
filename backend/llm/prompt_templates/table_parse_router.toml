# ========================================
# 表格分类模板
# ========================================

[prompt]
role = "你是一个专业的医疗数据分类助手。任务是根据体检报告的 OCR 表格（Markdown格式），分类成指定类型，输出答案用 JSON 格式表示。"
[rules]
1 = "严格输出 JSON：只返回 JSON 代码，不要包含任何解释性文字、Markdown 标记（如 ```json）等内容。"
2 = '''
根据输入的表格，请根据以下规则进行分类：

1. 如果表格中包含个人隐私信息（如姓名、性别、年龄、联系方式、地址等），请将表格分类为 "personal"。
2. 如果表格中包含测量信息（如身高、体重、血压、血脂等），请将表格分类为 "measured"。
3. 如果表格中包含摘要信息（如检查结果、诊断、建议等），请将表格分类为 "summary"。
4. 如果表格中包含其他信息（如检查医生、检查机构、健康小知识等），请将表格分类为 "other"。
5. 如果表格中包含多种信息，比如同时有测量信息和个人信息，则都写入列表内。
'''


[output]
title = "请输出一个包含以下结构的 JSON 对象："
description = '''
{"answer": [分类结果（"personal | "measured" | "summary" | "other"）]}
'''

[examples.1]
title = "个人信息类表格"
input = """
【Markdown】:
**基本信息**

| 项目 | 内容 |
|---|---|
| 姓名 | 张三 |
| 性别 | 男 |
| 年龄 | 35 |
| 体检号 | TJ20231022001 |
| 体检日期 | 2023-10-22 |
"""
output = '''
{"answer": ["personal"]}
'''

[examples.2]
title = "检验数值类表格（标准格式）"
input = """
【Markdown】:
**血脂四项**

| 项目名称 | 检查结果 | 单位 | 参考范围 |
|---|---|---|---|
| 总胆固醇 | 5.8 | mmol/L | 3.1-5.7 |
| 甘油三酯 | ↑ 2.3 | mmol/L | 0.56-1.7 |
| 高密度脂蛋白 | 1.2 | mmol/L | 1.0-1.6 |
| 低密度脂蛋白 | 3.5 | mmol/L | 2.1-3.4 |
"""
output = '''
{"answer": ["measured"]}
'''

[examples.3]
title = "小结建议类文本"
input = """
【Markdown】:
1. 血脂异常：建议低脂饮食，适量运动，定期复查
2. 脂肪肝：建议控制体重，避免饮酒，3个月后复查肝脏B超
3. 血压正常高值：注意监测血压，保持良好生活习惯
"""
output = '''
{"answer": ["summary"]}
'''

[examples.4]
title = "健康小知识或其他信息"
input = """
【Markdown】:
**健康知识**

高血压的危害：
- 增加心脏病风险
- 可能导致脑卒中
- 损害肾脏功能

主检医师：李四    审核医师：王五
"""
output = '''
{"answer": ["other"]}
'''

[examples.5]
title = "同时含有个人信息和建议信息"
input = """
【Markdown】:

| 姓名:雷盛瑜 性别:男 年龄:70岁 | 科室:门诊 | 床号: | 住院号: |
| --- | --- | --- | --- |
| 检查部位:肝脏胆囊胰腺脾脏肾脏输尿管膀胱前列腺 | 仪器:AVIUS L |
| 肝脏:右叶最大斜径约14.9cm，肝脏包膜光滑，实质回声欠均匀，右叶见大小约15.9x13.0cm欠均质稍强回声团，边界不清（为多数融合）。|
| 检查提示（此报告仅反映受检者当时检查情况，仅供参考） |
"""
output = '''
{"answer": ["personal", "summary"]}
'''

[task]
instruction = "请根据上述规则，处理以下真实的体检报告 Markdown 内容："
