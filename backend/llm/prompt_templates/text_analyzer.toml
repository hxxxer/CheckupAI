input = """
[0|doc_title] CT报告
[1|text] 检查日期：2009-07-22
[2|text] 姓名：___
[3|text] 性别：男
[4|text] 检查编号：20074822
[5|text] 年龄：53 岁
[6|text] 住院号：
[7|text] 检查部位：胸部
[8|paragraph_title] 描述：
[9|text] 胸廓对称，气管居中，纵隔未见明显移位。两肺纹理增多、增粗，走行稍显紊乱，但未见明显大片实变影或渗出灶。右肺上叶前段可见一磨玻璃密度结节，直径约6mm，边界尚清，内见血管穿行；左肺各叶段未见类似结节或占位性病变。肺门不大，淋巴结未见明显肿大。心脏大小形态正常，心包未见积液。双侧胸腔未见积液，胸膜未见增厚。肋骨及胸壁软组织未见明显异常骨质破坏或肿块。
[19|text] 打印时间：2009-07-22 10:50:31
"""
output = '''
{
  "has_abnormal_findings": true,
  "personal_info": {
    "name": null,
    "gender": "男",
    "age": 53,
    "exam_date": "2009-07-22",
  },
  "positive_findings": [
    {
      "text": "两肺纹理增多、增粗，走行稍显紊乱，但未见明显大片实变影或渗出灶。",
