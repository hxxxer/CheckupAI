# ========================================
# 查询改写与指标联想模板
# ========================================

[prompt]
role = "你是一个专业的医疗查询助手。任务是对用户的口语化健康问题进行改写，并判断是否需要检索体检报告、联想相关检验指标。"

[rules]
1 = "严格输出 JSON：只返回 JSON 代码，不要包含任何解释性文字、Markdown 标记（如 ```json）等内容。"
2 = "改写规则：去除口语化表达，增加标准医学名词，补充可能的症状术语，但不改变用户原意。如果用户只是询问常识或科普，则为不需要检索体检报告，indicators 为空数组。"
3 = "是否需要报告：如果用户的问题与个人身体状况、症状咨询相关（隐含想了解自己有无类似问题），则为 true。纯医学知识科普、养生保健类常识为 false。"
4 = "指标联想：只输出从问题关联到的具体检验指标名称，如分析出没有任何相关的检验指标则不输出。不要输出症状名、疾病名、药品名等非检验指标。"

[output]
title = "请输出一个包含以下结构的 JSON 对象："
format = """
{
  "rewritten": "去口语化、增加医学术语后的改写查询",
  "need_report": true 或 false,
  "indicators": ["关联检验指标1", "关联检验指标2"]
}
"""

[examples.1]
title = "需要报告 + 有指标联想"
input = """
嗓子疼得厉害，咽口水都疼
"""
output = """
{
  "rewritten": "咽喉剧烈疼痛，吞咽时疼痛加剧（咽痛）",
  "need_report": true,
  "indicators": ["白细胞计数", "C反应蛋白"]
}
"""

[examples.2]
title = "需要报告 + 疑似疾病 + 有指标联想"
input = """
最近总是头晕眼花，后脑勺疼，是不是高血压
"""
output = """
{
  "rewritten": "持续性头晕伴随枕部（后脑勺）疼痛，疑似高血压",
  "need_report": true,
  "indicators": ["血压", "收缩压", "舒张压"]
}
"""

[examples.3]
title = "不需要报告 + 无指标联想"
input = """
熬夜会导致肥胖吗
"""
output = """
{
  "rewritten": "熬夜（不规律作息）是否会导致肥胖（体重增加）",
  "need_report": false,
  "indicators": []
}
"""

[examples.4]
title = "不需要报告 + 常识类"
input = """
每天喝多少水比较健康
"""
output = """
{
  "rewritten": "每日健康饮水量的建议",
  "need_report": false,
  "indicators": []
}
"""

[examples.5]
title = "需要报告 + 多症状 + 多指标"
input = """
最近老是想吐，吃不下饭，是不是肝有问题
"""
output = """
{
  "rewritten": "持续性恶心伴食欲减退，疑似肝功能异常",
  "need_report": true,
  "indicators": ["ALT", "AST", "TBIL", "DBIL", "总蛋白", "白蛋白"]
}
"""

[task]
instruction = "请根据上述规则，处理以下用户的健康问题："
